<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hernan von Hausen — CV</title>
    <meta name="description" content="Hernan von Hausen Cardenas — Product Business Analyst. CV in English and Spanish." />
    <meta property="og:title" content="Hernan von Hausen — CV" />
    <meta property="og:description" content="Product Business Analyst · Santiago, Chile" />
    <meta property="og:type" content="profile" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .lang-hidden { display: none; }

      .toolbar-left {
        font-size: 15px;
        font-weight: 600;
        color: var(--color-ink);
        letter-spacing: -0.01em;
      }

      #lang-toggle {
        background: none;
        border: 1px solid var(--color-rule);
        cursor: pointer;
        font-family: inherit;
        font-size: 13.5px;
      }

      #lang-toggle:hover {
        background: var(--color-accent-soft);
        border-color: var(--color-accent);
        color: var(--color-accent);
      }

      /* Override the .header (profile block inside paper) for embedded mode */
      .paper .cv-head {
        border-bottom: 2px solid var(--color-ink);
        padding-bottom: 18px;
        margin-bottom: 24px;
      }

      .paper .cv-head .name {
        font-size: 28px;
      }

      footer.page-footer {
        max-width: var(--page-max);
        margin: 0 auto 40px;
        padding: 0 24px;
        color: var(--color-muted);
        font-size: 12.5px;
        text-align: center;
      }

      footer.page-footer a { color: var(--color-muted); }
    </style>
  </head>
  <body>
    <header class="toolbar" role="banner">
      <div class="toolbar-inner">
        <div class="toolbar-left">Hernan von Hausen</div>
        <div class="toolbar-actions">
          <button class="btn" id="lang-toggle" onclick="switchLang()">Español</button>
          <a class="btn btn-primary" id="pdf-btn"
             href="./en/cv.pdf"
             download="CV_Hernan_von_Hausen_en.pdf">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-right:4px">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download CV
          </a>
        </div>
      </div>
    </header>

    <main>
      <article class="paper" id="cv-en" lang="en" role="main" aria-label="CV in English">
        {{{cvEn}}}
      </article>

      <article class="paper lang-hidden" id="cv-es" lang="es" role="main" aria-label="CV en Español">
        {{{cvEs}}}
      </article>
    </main>

    <footer class="page-footer">
      <p>
        <a href="https://github.com/hvonhausen/CV" target="_blank" rel="noopener">github.com/hvonhausen/CV</a>
        · Built from JSON · Deployed via GitHub Actions · {{buildDate}}
      </p>
    </footer>

    <script>
      var lang = 'en';
      function switchLang() {
        lang = lang === 'en' ? 'es' : 'en';
        var isEn = lang === 'en';
        document.getElementById('cv-en').classList.toggle('lang-hidden', !isEn);
        document.getElementById('cv-es').classList.toggle('lang-hidden', isEn);
        document.getElementById('lang-toggle').textContent = isEn ? 'Español' : 'English';
        var btn = document.getElementById('pdf-btn');
        btn.href = isEn ? './en/cv.pdf' : './es/cv.pdf';
        btn.download = isEn ? 'CV_Hernan_von_Hausen_en.pdf' : 'CV_Hernan_von_Hausen_es.pdf';
        document.documentElement.lang = lang;
      }
    </script>
  </body>
</html>
